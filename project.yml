name: BmadBrowser
options:
  bundleIdPrefix: com.vincentlauriat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  BmadBrowser:
    type: application
    platform: macOS
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed — brew install swiftlint to enable linting"
          fi
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
      - path: Resources/Localizable.xcstrings
    dependencies:
      - package: MarkdownUI
        product: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincentlauriat.BmadBrowser
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Vincent Lauriat"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        CODE_SIGN_ENTITLEMENTS: Resources/BmadBrowser.entitlements
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES

  BmadBrowserTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: BmadBrowser
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vincentlauriat.BmadBrowserTests
        SWIFT_VERSION: "5.0"

schemes:
  BmadBrowser:
    build:
      targets:
        BmadBrowser: all
    test:
      targets:
        - BmadBrowserTests
