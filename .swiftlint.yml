# SwiftLint — configuration BmadBrowser
# Installer : brew install swiftlint. La phase de build ne s'exécute que s'il est présent.

included:
  - Sources
  - Tests

excluded:
  - build
  - .build
  - BmadBrowser.xcodeproj

disabled_rules:
  - todo                     # les TODO/FIXME sont suivis dans TODOS.md
  - trailing_comma

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - first_where
  - sorted_first_last

line_length:
  warning: 140
  ignores_comments: true

identifier_name:
  min_length: 2
  excluded: [id, fm, kO, i, x, y, s, v, k]

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800
